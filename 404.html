<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>???</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0a0a00;
    font-family: "Courier New", "Consolas", monospace;
    color: #d4c44a;
    user-select: none;
    cursor: crosshair;
  }
  body {
    position: relative;
    transition: filter 1.2s ease;
  }

  /* ======== 场景底：黄绿墙体 + 地毯 + 天花板渐变 ======== */
  .scene {
    position: fixed; inset: 0;
    background:
      /* 暗角 */
      radial-gradient(ellipse at 50% 45%, transparent 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.92) 100%),
      /* 地面（脏旧地毯） */
      linear-gradient(to bottom, transparent 62%, #6b5a1e 70%, #3a2f0c 90%, #110d00 100%),
      /* 墙体黄绿 */
      linear-gradient(to bottom, #a89c32 0%, #c4b840 40%, #b5a838 62%);
    filter: saturate(0.9) contrast(1.05);
  }

  /* 壁纸纹理：重复的暗纹菱形 + 竖线 */
  .wallpaper {
    position: fixed; inset: 0 0 38% 0;
    background-image:
      radial-gradient(circle at 20px 20px, rgba(90,78,18,0.55) 1.5px, transparent 2.5px),
      radial-gradient(circle at 60px 60px, rgba(90,78,18,0.55) 1.5px, transparent 2.5px),
      repeating-linear-gradient(90deg,
        rgba(80,68,14,0.18) 0 2px,
        transparent 2px 22px);
    background-size: 80px 80px, 80px 80px, auto;
    mix-blend-mode: multiply;
    opacity: 0.55;
    pointer-events: none;
  }

  /* 地毯斑驳纹 */
  .carpet {
    position: fixed; left: 0; right: 0; bottom: 0; height: 38%;
    background-image:
      radial-gradient(ellipse at 30% 40%, rgba(0,0,0,0.35), transparent 45%),
      radial-gradient(ellipse at 70% 70%, rgba(0,0,0,0.45), transparent 50%),
      repeating-linear-gradient(45deg,
        rgba(0,0,0,0.08) 0 4px,
        transparent 4px 10px);
    mix-blend-mode: multiply;
    opacity: 0.9;
    pointer-events: none;
  }

  /* 天花板荧光灯：上方的强光雾气 */
  .ceiling-light {
    position: fixed; top: 0; left: 0; right: 0; height: 28%;
    background: linear-gradient(to bottom,
      rgba(255, 250, 190, 0.55) 0%,
      rgba(255, 240, 130, 0.22) 40%,
      transparent 100%);
    mix-blend-mode: screen;
    pointer-events: none;
    animation: flicker 2.6s infinite;
  }
  @keyframes flicker {
    0%, 12%, 40%, 72%, 100% { opacity: 0.95; }
    13% { opacity: 0.25; }
    14% { opacity: 0.9; }
    41% { opacity: 0.1; }
    42% { opacity: 0.85; }
    43% { opacity: 0.5; }
    44% { opacity: 0.95; }
    73% { opacity: 0.15; }
    74% { opacity: 0.92; }
  }

  /* 扫描线 */
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,0.18) 0 1px,
      transparent 1px 3px);
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 4;
    opacity: 0.55;
  }

  /* 颗粒噪点（纯 CSS 动画位移 + SVG 噪声） */
  .grain {
    position: fixed; inset: -20%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.9  0 0 0 0 0.4  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-size: 300px 300px;
    opacity: 0.14;
    mix-blend-mode: overlay;
    pointer-events: none;
    animation: grain-shift 0.18s steps(3) infinite;
    z-index: 5;
  }
  @keyframes grain-shift {
    0%   { transform: translate(0, 0); }
    33%  { transform: translate(-3%, 4%); }
    66%  { transform: translate(4%, -2%); }
    100% { transform: translate(-2%, 2%); }
  }

  /* 小故障：横向撕裂条（JS 触发） */
  .glitch-bar {
    position: fixed; left: 0; right: 0;
    background: rgba(255, 255, 210, 0.35);
    mix-blend-mode: difference;
    opacity: 0;
    z-index: 9;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  /* 大闪屏（点击瞬闪 / 触发时爆闪） */
  .flash {
    position: fixed; inset: 0;
    background: #fffbd6;
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    z-index: 30;
  }

  /* ======== 前景文字 ======== */
  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20;
    text-align: center;
    padding: 1rem;
  }
  h1 {
    font-size: clamp(4.5rem, 16vw, 12rem);
    font-weight: 700;
    letter-spacing: 0.25em;
    color: #f4e88a;
    text-shadow:
      0 0 6px rgba(255,245,170,0.9),
      0 0 28px rgba(212,196,74,0.7),
      2px 0 0 rgba(255,80,40,0.55),
      -2px 0 0 rgba(40,180,220,0.45);
    will-change: transform, text-shadow;
  }
  .sub {
    margin-top: 1.2rem;
    font-size: clamp(0.75rem, 1.6vw, 1rem);
    letter-spacing: 0.55em;
    color: #b8a93a;
    opacity: 0.85;
  }
  .whisper {
    margin-top: 3.2rem;
    font-size: clamp(0.7rem, 1.4vw, 0.9rem);
    letter-spacing: 0.32em;
    color: #8f8224;
    opacity: 0.55;
  }

  /* 角落 HUD */
  .hud {
    position: fixed;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: #8f8224;
    opacity: 0.55;
    z-index: 20;
    pointer-events: none;
  }
  .hud.tl { top: 0.9rem; left: 1rem; }
  .hud.tr { top: 0.9rem; right: 1rem; text-align: right; }
  .hud.bl { bottom: 0.9rem; left: 1rem; }

  .counter {
    position: fixed; bottom: 0.9rem; left: 50%;
    transform: translateX(-50%);
    font-size: 0.8rem;
    letter-spacing: 0.55em;
    color: #a89a2d;
    opacity: 0.75;
    z-index: 20;
    pointer-events: none;
    white-space: nowrap;
  }

  .escape {
    position: fixed; bottom: 0.9rem; right: 1rem;
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    color: #a89a2d;
    opacity: 0.35;
    text-decoration: none;
    z-index: 25;
    transition: opacity 0.3s;
  }
  .escape:hover { opacity: 0.9; }

  /* ======== 触发后：反转 + 溶解 ======== */
  body.inverted {
    filter: invert(1) hue-rotate(180deg) contrast(1.1);
  }
  body.dissolving {
    animation: dissolve 3.4s ease-in forwards;
  }
  @keyframes dissolve {
    0%   { filter: invert(1) hue-rotate(180deg) contrast(1.1) blur(0);   transform: scale(1);     opacity: 1;   }
    35%  { filter: invert(1) hue-rotate(420deg) contrast(1.3) blur(3px); transform: scale(1.02);  opacity: 0.85;}
    70%  { filter: invert(1) hue-rotate(720deg) contrast(0.8) blur(14px);transform: scale(1.08);  opacity: 0.4; }
    100% { filter: invert(1) hue-rotate(900deg) contrast(0.4) blur(48px);transform: scale(1.22);  opacity: 0;   }
  }

  /* 用户可能偏好减少动效 */
  @media (prefers-reduced-motion: reduce) {
    .ceiling-light, .grain { animation: none; }
  }
</style>
</head>
<body>
  <div class="scene"></div>
  <div class="wallpaper"></div>
  <div class="carpet"></div>
  <div class="ceiling-light"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>
  <div class="glitch-bar" id="glitch"></div>
  <div class="flash" id="flash"></div>

  <div class="stage">
    <h1 id="title">404</h1>
    <div class="sub">// NO&nbsp;CLIP&nbsp;DETECTED //</div>
    <div class="whisper">你&nbsp;&nbsp;不&nbsp;&nbsp;属&nbsp;&nbsp;于&nbsp;&nbsp;这&nbsp;&nbsp;里</div>
  </div>

  <div class="hud tl">[ LEVEL&nbsp;0 · THE&nbsp;LOBBY ]</div>
  <div class="hud tr">SIGNAL&nbsp;LOST<br>REC&nbsp;●</div>
  <div class="hud bl" id="coord">X:&nbsp;???&nbsp;&nbsp;Y:&nbsp;???</div>
  <div class="counter" id="counter">◌ ◌ ◌ ◌ ◌ ◌ ◌ ◌ ◌ ◌</div>
  <a href="/" class="escape">&larr; RETURN&nbsp;HOME</a>

<script>
(function () {
  "use strict";

  var body      = document.body;
  var titleEl   = document.getElementById("title");
  var counterEl = document.getElementById("counter");
  var coordEl   = document.getElementById("coord");
  var glitchBar = document.getElementById("glitch");
  var flashEl   = document.getElementById("flash");

  var clicks = 0;
  var MAX = 10;
  var finished = false;

  // --------- UI 更新 ----------
  function renderCounter() {
    var filled = "";
    for (var i = 0; i < MAX; i++) filled += (i < clicks ? "●" : "◌") + (i === MAX - 1 ? "" : " ");
    counterEl.textContent = filled;
  }
  renderCounter();

  // 随机坐标刷新（假 HUD）
  setInterval(function () {
    if (finished) return;
    var x = Math.floor(Math.random() * 9999);
    var y = Math.floor(Math.random() * 9999);
    coordEl.innerHTML = "X:&nbsp;" + x + "&nbsp;&nbsp;Y:&nbsp;" + y;
  }, 900);

  // --------- 画面故障 ----------
  function spawnGlitchBar() {
    if (finished) return;
    var top = Math.random() * 100;
    var h = 2 + Math.random() * 14;
    glitchBar.style.top = top + "%";
    glitchBar.style.height = h + "px";
    glitchBar.style.transform = "translateX(" + ((Math.random() - 0.5) * 40) + "px)";
    glitchBar.style.opacity = "1";
    setTimeout(function () { glitchBar.style.opacity = "0"; }, 100 + Math.random() * 200);
  }

  function jitterTitle() {
    if (finished) return;
    var dx = (Math.random() - 0.5) * 18;
    var dy = (Math.random() - 0.5) * 10;
    var sk = (Math.random() - 0.5) * 6;
    titleEl.style.transition = "transform 0.04s linear";
    titleEl.style.transform = "translate(" + dx + "px," + dy + "px) skewX(" + sk + "deg)";
    setTimeout(function () {
      titleEl.style.transition = "transform 0.25s ease";
      titleEl.style.transform = "";
    }, 90 + Math.random() * 160);
  }

  // 随机触发（避免用 setInterval 的僵硬节奏）
  function scheduleGlitch() {
    if (finished) return;
    spawnGlitchBar();
    if (Math.random() < 0.35) jitterTitle();
    setTimeout(scheduleGlitch, 500 + Math.random() * 2400);
  }
  scheduleGlitch();

  // 点击瞬闪
  function shortFlash(intensity) {
    flashEl.style.transition = "opacity 0s";
    flashEl.style.opacity = String(intensity || 0.45);
    requestAnimationFrame(function () {
      flashEl.style.transition = "opacity 0.25s ease-out";
      flashEl.style.opacity = "0";
    });
  }

  // --------- 音频（过程化，点击后才初始化） ----------
  var actx = null;
  var ambienceGain = null;

  function initAudio() {
    if (actx) return;
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try { actx = new AC(); } catch (e) { actx = null; return; }

    // ---- 背景：过滤后的粉噪 ----
    var len = 3 * actx.sampleRate;
    var buf = actx.createBuffer(1, len, actx.sampleRate);
    var data = buf.getChannelData(0);
    var b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
    for (var i = 0; i < len; i++) {
      var white = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
      b6 = white * 0.115926;
    }
    var src = actx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    var lp = actx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 850;
    ambienceGain = actx.createGain();
    ambienceGain.gain.value = 0;
    src.connect(lp).connect(ambienceGain).connect(actx.destination);
    src.start();
    ambienceGain.gain.linearRampToValueAtTime(0.14, actx.currentTime + 2.5);

    // ---- 偶发：风声（滤波白噪 + 缓慢起伏） ----
    function gust() {
      if (!actx || finished) return;
      var dur = 3 + Math.random() * 2;
      var nb = actx.createBuffer(1, Math.floor(actx.sampleRate * dur), actx.sampleRate);
      var nd = nb.getChannelData(0);
      for (var i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
      var ns = actx.createBufferSource();
      ns.buffer = nb;
      var hp = actx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 120;
      var lp2 = actx.createBiquadFilter(); lp2.type = "lowpass";  lp2.frequency.value = 300;
      var g = actx.createGain(); g.gain.value = 0;
      ns.connect(hp).connect(lp2).connect(g).connect(actx.destination);
      var t = actx.currentTime;
      g.gain.linearRampToValueAtTime(0.22, t + dur * 0.35);
      g.gain.linearRampToValueAtTime(0, t + dur);
      lp2.frequency.setValueAtTime(200, t);
      lp2.frequency.linearRampToValueAtTime(800, t + dur * 0.4);
      lp2.frequency.linearRampToValueAtTime(180, t + dur);
      ns.start(t);
      ns.stop(t + dur + 0.1);
    }

    // ---- 偶发：脚步（低频闷响 + 冲击噪） ----
    function step(delay, vol) {
      if (!actx) return;
      var t = actx.currentTime + delay;
      // 低频 thump
      var osc = actx.createOscillator();
      osc.type = "sine";
      osc.frequency.setValueAtTime(140, t);
      osc.frequency.exponentialRampToValueAtTime(38, t + 0.18);
      var og = actx.createGain();
      og.gain.setValueAtTime(vol, t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.connect(og).connect(actx.destination);
      osc.start(t); osc.stop(t + 0.25);
      // 冲击噪（鞋跟）
      var nlen = Math.floor(actx.sampleRate * 0.14);
      var nb = actx.createBuffer(1, nlen, actx.sampleRate);
      var nd = nb.getChannelData(0);
      for (var i = 0; i < nlen; i++) {
        nd[i] = (Math.random() * 2 - 1) * Math.exp(-i / (actx.sampleRate * 0.04));
      }
      var ns = actx.createBufferSource(); ns.buffer = nb;
      var nf = actx.createBiquadFilter(); nf.type = "bandpass"; nf.frequency.value = 1800;
      var ng = actx.createGain(); ng.gain.value = vol * 0.35;
      ns.connect(nf).connect(ng).connect(actx.destination);
      ns.start(t);
    }
    function footsteps() {
      if (finished) return;
      var base = 0.14 + Math.random() * 0.1;
      var n = 2 + Math.floor(Math.random() * 4);
      for (var i = 0; i < n; i++) step(i * (0.42 + Math.random() * 0.15), base * (0.85 + Math.random() * 0.3));
    }

    // 随机调度
    function loopWind() {
      if (finished) return;
      gust();
      setTimeout(loopWind, 8000 + Math.random() * 14000);
    }
    function loopSteps() {
      if (finished) return;
      footsteps();
      setTimeout(loopSteps, 11000 + Math.random() * 17000);
    }
    setTimeout(loopWind,  2500 + Math.random() * 3500);
    setTimeout(loopSteps, 4500 + Math.random() * 5000);
  }

  // --------- 交互 ----------
  document.addEventListener("click", function (e) {
    // 允许点 RETURN 链接正常跳转
    if (e.target && e.target.closest && e.target.closest("a")) return;
    if (finished) return;

    initAudio();
    if (actx && actx.state === "suspended") actx.resume();

    clicks = Math.min(MAX, clicks + 1);
    renderCounter();
    shortFlash(0.35);
    spawnGlitchBar();
    jitterTitle();

    if (clicks >= MAX) trigger();
  });

  // 按任意键也算触发，方便没有鼠标时也能测试（不计入点击数）
  document.addEventListener("keydown", function () {
    initAudio();
    if (actx && actx.state === "suspended") actx.resume();
  });

  // --------- 触发：色彩反转 + 溶解 ----------
  function trigger() {
    finished = true;
    // 爆闪
    flashEl.style.transition = "opacity 0.06s";
    flashEl.style.opacity = "1";
    setTimeout(function () {
      flashEl.style.transition = "opacity 1.6s ease-out";
      flashEl.style.opacity = "0";
    }, 140);
    // 色彩反转
    setTimeout(function () { body.classList.add("inverted"); }, 220);
    // 溶解
    setTimeout(function () { body.classList.add("dissolving"); }, 1200);
    // 淡出音频
    if (actx && ambienceGain) {
      ambienceGain.gain.cancelScheduledValues(actx.currentTime);
      ambienceGain.gain.linearRampToValueAtTime(0, actx.currentTime + 3);
    }
    // 溶解尽头：回到首页
    setTimeout(function () { window.location.href = "/"; }, 4700);
  }
})();
</script>
</body>
</html>
